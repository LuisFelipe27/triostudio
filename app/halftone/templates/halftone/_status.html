{% load i18n %}
{% if job.status == 'done' %}
    <div class="ts-status ts-status--ok">&#10003; Vista previa actualizada</div>
    <script>
    (function () {
        var url = '{{ job.preview.url }}?v={{ job.modified|date:"U" }}';
        var img = document.getElementById('ts-img-result');
        if (img) img.src = url;
        if (window.TrioStudio) window.TrioStudio.onPreviewReady();
    })();
    </script>
{% elif job.status == 'error' %}
    <div class="ts-status ts-status--err">&#10007; Error: {{ job.error_message }}</div>
{% else %}
    <div class="ts-status ts-status--busy">
        <span class="ts-spinner"></span> Generando halftone&hellip;
    </div>
{% endif %}
