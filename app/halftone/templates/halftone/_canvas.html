{% load i18n %}
<div class="ts-stage" id="ts-stage"
     data-job-id="{{ job.pk }}"
     data-original-url="{{ job.original.url }}"
     data-preview-url="{% if job.preview %}{{ job.preview.url }}?v={{ job.modified|date:'U' }}{% endif %}"
     data-delete-url="{% url 'halftone:delete_job' job.pk %}"
     data-params-url="{% url 'halftone:update_params' job.pk %}"
     data-export-url="{% url 'halftone:export_job' job.pk %}"
     data-status-url="{% url 'halftone:job_status' job.pk %}">

    <div class="ts-compare">
        <div class="ts-compare-pane">
            <span class="ts-compare-label">Original</span>
            <img class="ts-stage-img" id="ts-img-original"
                 src="{{ job.original.url }}" alt="original">
        </div>
        <div class="ts-compare-pane ts-checker">
            <span class="ts-compare-label">Halftone</span>
            <img class="ts-stage-img" id="ts-img-result"
                 src="{% if job.preview %}{{ job.preview.url }}?v={{ job.modified|date:'U' }}{% else %}{{ job.original.url }}{% endif %}"
                 alt="halftone result">
        </div>
    </div>

    <span id="ts-poller" hidden
          hx-get="{% url 'halftone:job_status' job.pk %}?mode=preview"
          hx-trigger="every 1500ms [shouldPoll()]"
          hx-target="#ts-status"
          hx-swap="innerHTML"></span>
</div>

<script>
(function () {
    var stage = document.getElementById('ts-stage');

    var paramsForm = document.getElementById('ts-params-form');
    if (paramsForm) {
        paramsForm.setAttribute('hx-post', stage.dataset.paramsUrl);
        htmx.process(paramsForm);
    }

    var applyBtn = document.getElementById('ts-apply-btn');
    if (applyBtn) {
        applyBtn.disabled = false;
        applyBtn.dataset.paramsUrl = stage.dataset.paramsUrl;
    }

    var exportBtn = document.getElementById('ts-export-btn');
    if (exportBtn) {
        exportBtn.disabled = false;
        exportBtn.dataset.exportUrl = stage.dataset.exportUrl;
    }

    var delBtn = document.getElementById('ts-delete-btn');
    if (delBtn) {
        delBtn.setAttribute('hx-post', stage.dataset.deleteUrl);
        delBtn.setAttribute('hx-target', '#ts-canvas');
        delBtn.setAttribute('hx-swap', 'innerHTML');
        htmx.process(delBtn);
    }

    var poller = document.getElementById('ts-poller');
    if (poller) htmx.process(poller);

    if (window.TrioStudio) window.TrioStudio.onStageReady();
})();
</script>
