{% load i18n %}
<form id="ts-upload-form"
      hx-post="{% url 'halftone:upload' %}"
      hx-encoding="multipart/form-data"
      hx-target="#ts-canvas"
      hx-swap="innerHTML"
      hx-indicator="#ts-upload-spinner">
    {% csrf_token %}
    <label class="ts-dropzone" for="id_original">
        <span class="ts-dz-icon">⤴</span>
        <span class="ts-dz-title">Arrastra una imagen o haz clic</span>
        <span class="ts-dz-hint">PNG / JPG · hasta 20&nbsp;MB · se recomienda fondo plano o transparente</span>
        {{ upload_form.original }}
        <span id="ts-upload-spinner" class="ts-spinner htmx-indicator"></span>
    </label>
</form>
<script>
(function () {
    var a = document.getElementById('ts-canvas-actions');
    var z = document.getElementById('ts-zoombar');
    var f = document.getElementById('ts-fabricbar');
    if (a) a.hidden = true;
    if (z) z.hidden = true;
    if (f) f.hidden = true;
    var status = document.getElementById('ts-status');
    if (status) { status.className = 'ts-status ts-status--idle'; status.innerHTML = ''; }
    var applyBtn = document.getElementById('ts-apply-btn');
    if (applyBtn) { applyBtn.disabled = true; applyBtn.classList.remove('is-dirty'); applyBtn.dataset.paramsUrl = ''; }
    var exportBtn = document.getElementById('ts-export-btn');
    if (exportBtn) { exportBtn.disabled = true; exportBtn.dataset.exportUrl = ''; }
})();
</script>
