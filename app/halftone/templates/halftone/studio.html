{% load static i18n %}<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>TrioStudio &middot; Halftone DTF</title>
    <link rel="stylesheet" href="{% static 'halftone/css/studio.css' %}">
    <script src="https://unpkg.com/htmx.org@1.9.12" defer></script>
</head>
<body class="ts-body">
    <header class="ts-topbar">
        <div class="ts-brand">
            <span class="ts-logo">&#9680;</span>
            <div class="ts-brand-txt">
                <strong>TrioStudio</strong>
                <small>Convertidor Halftone DTF</small>
            </div>
        </div>
        <div class="ts-top-actions">
            <span class="ts-chip">Beta</span>
        </div>
    </header>

    <main class="ts-shell">
        <section class="ts-canvas-wrap">
            <div class="ts-canvas-actions" id="ts-canvas-actions" hidden>
                <button type="button" class="ts-btn-dark" id="ts-replace-btn">&#8635; Reemplazar imagen</button>
                <button type="button" class="ts-btn-dark" id="ts-delete-btn" hx-confirm="&iquest;Eliminar la imagen actual?">&#128465; Eliminar</button>
            </div>

            <div id="ts-canvas" class="ts-canvas">
                {% include 'halftone/_dropzone.html' with upload_form=upload_form %}
            </div>

            <div id="ts-status" class="ts-status ts-status--idle"></div>

            <div class="ts-zoombar" id="ts-zoombar" hidden>
                <button type="button" class="ts-zoom-btn" id="ts-zoom-undo" title="Restablecer">&#8635;</button>
                <span class="ts-zoom-sep"></span>
                <button type="button" class="ts-zoom-btn" id="ts-zoom-out" title="Alejar">&minus;</button>
                <span class="ts-zoom-val" id="ts-zoom-val">100%</span>
                <button type="button" class="ts-zoom-btn" id="ts-zoom-in" title="Acercar">+</button>
                <span class="ts-zoom-sep"></span>
                <button type="button" class="ts-zoom-btn" id="ts-zoom-fit" title="Ajustar a ventana">&#10562;</button>
            </div>
        </section>

        <aside class="ts-sidebar">
            <div class="ts-sidebar-body">
                <button type="button" class="ts-reset-btn" id="ts-reset-btn">&#8634; Restablecer</button>

                <form id="ts-params-form"
                      hx-target="#ts-status"
                      hx-swap="innerHTML">
                    {% csrf_token %}
                    {% include 'halftone/_sidebar_fields.html' with form=form %}
                </form>
            </div>

            <div class="ts-sidebar-footer">
                <button type="button" id="ts-apply-btn" class="ts-apply-btn" disabled>
                    &#9654; Aplicar cambios
                </button>
                <button type="button" id="ts-export-btn" class="ts-export-btn" disabled>
                    <span>&#11018;</span> Exportar
                </button>
            </div>
        </aside>
    </main>

    <script src="{% static 'halftone/js/studio.js' %}"></script>
</body>
</html>
