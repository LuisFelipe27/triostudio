<!--begin::Email template-->
<style>
    html,body { padding:0; margin:0; font-family: Inter, Helvetica, "sans-serif"; }
    a:hover { color: #00cf9b; }
</style>
<div id="#kt_app_body_content" style="background-color:#D5D9E2; font-family:Arial,Helvetica,sans-serif; line-height: 1.5; min-height: 100%; font-weight: normal; font-size: 15px; color: #2F3044; margin:0; padding:0; width:100%;">
    <div style="background-color:#ffffff; padding: 45px 0 34px 0; border-radius: 24px; margin:40px auto; max-width: 600px;">
        <table align="center" border="0" cellpadding="0" cellspacing="0" width="100%" height="auto" style="border-collapse:collapse">
            <tbody>
                <tr>
                    <td align="center" valign="center" style="text-align:center; padding-bottom: 10px">
                        <!--begin:Email content-->
                        <div style="margin-bottom:55px; text-align:left">
                            {% if email_header %}
                            <!--begin:Logo-->
                            <div style="margin:-10px 60px 54px 60px; text-align:center;">
                                <img alt="Logo" src="{{ email_header }}" style="height: 35px" />
                            </div>
                            <!--end:Logo-->
                            {% endif %}
                            <!--begin:Text-->
                            <div style="font-size:14px; text-align:left; font-weight:500; margin:0 60px 33px 60px; font-family:Arial,Helvetica,sans-serif">
                                {% autoescape off %}
                                {{ body }}
                                {% endautoescape %}
                            </div>
                            <!--end:Text-->
                        </div>
                        <!--end:Email content-->
                    </td>
                </tr>
                <tr>
                    <td align="center" valign="center" style="font-size: 13px; padding:0 15px; text-align:center; font-weight: 500; color: #A1A5B7;font-family:Arial,Helvetica,sans-serif">
                        <p>&copy; Copyright Keli.
                    </td>
                </tr>
            </tbody>
        </table>
    </div>
</div>
<!--end::Email template-->
